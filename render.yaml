services:
  - type: web
    name: maximum-help
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
